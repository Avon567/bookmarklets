<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bookmarklet Hub</title>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#fff;
  --muted:#94a3b8;
  --accent:#3b82f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
  radial-gradient(circle at top,#1e293b,#0f172a);
  font-family:
  Inter,system-ui,sans-serif;
  color:var(--text);
  padding:20px;
}

.card{
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:32px;
  text-align:center;
  box-shadow:
  0 20px 40px rgba(0,0,0,.3);
}

.icon{
  font-size:54px;
  margin-bottom:16px;
}

h1{
  font-size:28px;
  margin-bottom:8px;
}

.desc{
  color:var(--muted);
  line-height:1.5;
  margin-bottom:24px;
}

button{
  width:100%;
  border:none;
  cursor:pointer;
  background:var(--accent);
  color:white;
  font-size:16px;
  font-weight:600;
  padding:14px;
  border-radius:14px;
  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
}

button:active{
  transform:scale(.98);
}

.message{
  margin-top:16px;
  color:#22c55e;
  min-height:20px;
}

.loading{
  color:var(--muted);
}

.error{
  color:#ef4444;
}
</style>
</head>
<body>

<div class="card">

<div class="icon" id="icon">⚡</div>

<h1 id="title">Loading...</h1>

<p class="desc" id="desc">
Loading bookmarklet...
</p>

<button id="copyBtn" disabled>
Copy Bookmarklet
</button>

<div class="message" id="msg"></div>

</div>

<script>
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const icon = document.getElementById("icon");
const btn = document.getElementById("copyBtn");
const msg = document.getElementById("msg");

const id =
new URLSearchParams(location.search)
.get("id");

fetch("bookmarklets.json")
.then(r => r.json())
.then(data => {

const item = data[id];

if (!item) {
title.textContent = "Not Found";
desc.textContent =
"Bookmarklet does not exist.";
msg.className = "message error";
msg.textContent = "Invalid ID";
return;
}

title.textContent = item.name;
desc.textContent = item.description;
icon.textContent = item.icon;

btn.disabled = false;

btn.onclick = async () => {

try {

await navigator.clipboard
.writeText(item.code);

msg.className = "message";
msg.textContent = "✓ Copied to clipboard";

btn.textContent = "Copied!";

setTimeout(() => {
btn.textContent =
"Copy Bookmarklet";
}, 2000);

}
catch {

msg.className =
"message error";

msg.textContent =
"Clipboard access denied";
}

};

})
.catch(() => {

title.textContent = "Error";

desc.textContent =
"Failed to load bookmarklets.";

msg.className = "message error";
msg.textContent =
"Could not load JSON";

});
</script>

</body>
</html>
